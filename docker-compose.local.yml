# Local container from beskid_tracker/ only — for production-parity image use docker-compose.yml (superrepo context).
services:
  tracker:
    build:
      context: ..
      dockerfile: beskid_tracker/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data/runtime:/app/beskid_tracker/data/runtime
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
