# Coolify entrypoint (see beskid_tracker/COOLIFY.md). Build context is the superrepo root.
services:
  tracker:
    build:
      context: ../..
      dockerfile: beskid_tracker/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - tracker-data:/app/beskid_tracker/data/runtime
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tracker-data:
